<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matemáticas</title>
  <style>
    /* ── Reset & base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4ff;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }

    /* ── Header ───────────────────────────────────── */
    header {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #4361ee;
      color: white;
      border-radius: 16px;
      padding: 0.75rem 1.25rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 12px rgba(67,97,238,0.3);
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    .stats { display: flex; gap: 1rem; }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 0.75rem;
      opacity: 0.85;
    }
    .stat span { font-size: 1.1rem; font-weight: 700; opacity: 1; }

    /* ── Main card ────────────────────────────────── */
    main {
      width: 100%;
      max-width: 600px;
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .level-badge {
      display: inline-block;
      background: #e0e7ff;
      color: #4361ee;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: 2px solid #c7d2fe;
      margin-bottom: 1rem;
    }
    #problem {
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin: 1.5rem 0;
      letter-spacing: 0.02em;
      min-height: 3rem;
    }

    /* ── Input row ────────────────────────────────── */
    .input-row {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    #answer {
      font-size: 1.2rem;
      padding: 0.65rem 1rem;
      border: 2px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    #answer:focus { border-color: #4361ee; }
    #submit {
      background: #4361ee;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.65rem 1.25rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }
    #submit:hover { background: #3451d1; }
    #submit:focus-visible,
    #next:focus-visible,
    #levelup button:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 2px;
    }

    /* ── Feedback ─────────────────────────────────── */
    #feedback {
      border-radius: 12px;
      padding: 1rem;
      font-size: 0.95rem;
      line-height: 1.5;
      display: none;
    }
    #feedback.correct {
      display: block;
      min-height: 5rem;
      background: #d1fae5;
      color: #065f46;
      border: 1.5px solid #6ee7b7;
    }
    #feedback.wrong {
      display: block;
      min-height: 5rem;
      background: #fee2e2;
      color: #991b1b;
      border: 1.5px solid #fca5a5;
    }
    #feedback strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
    .steps { margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.35rem; }
    .step { display: flex; align-items: center; gap: 0.4rem; }
    .step::before { content: '→'; opacity: 0.5; flex-shrink: 0; }
    .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; font-size: 0.9em; margin: 0 0.1em; }
    .frac .num { border-bottom: 1.5px solid currentColor; padding: 0 0.15em; line-height: 1.3; }
    .frac .den { padding: 0 0.15em; line-height: 1.3; }

    /* ── Level picker ──────────────────────────────── */
    .level-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      position: relative;
    }
    .level-badge {
      margin-bottom: 0;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .level-badge:hover { background: #c7d2fe; }
    .level-badge::after {
      content: ' ▾';
      font-size: 1.3em;
      opacity: 1;
    }
    #level-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: white;
      border: 1.5px solid #c7d2fe;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(67,97,238,0.15);
      padding: 0.5rem;
      gap: 0.4rem;
      z-index: 50;
      flex-direction: column;
      min-width: 160px;
    }
    #level-menu.open { display: flex; }
    .level-option {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 0.75rem;
      border-radius: 10px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      color: #374151;
      text-align: left;
      transition: background 0.15s;
      width: 100%;
    }
    .level-option:hover { background: #e0e7ff; color: #4361ee; }
    .level-option.active { background: #4361ee; color: white; }
    .level-option .level-dot {
      width: 1.5rem; height: 1.5rem;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.2;
      flex-shrink: 0;
    }
    .level-option.active .level-dot { opacity: 0.35; background: white; }

    /* ── Next button ──────────────────────────────── */
    #next {
      display: none;
      width: 100%;
      margin-top: 1rem;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #next:hover { background: #059669; }

    /* ── Level-up overlay ─────────────────────────── */
    #levelup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(67,97,238,0.92);
      color: white;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      z-index: 100;
      gap: 0.5rem;
    }
    #levelup.show { display: flex; }
    #levelup .emoji { font-size: 4rem; }
    #levelup p { font-size: 1.1rem; font-weight: 400; margin-top: 0.5rem; opacity: 0.85; }
    #levelup button {
      margin-top: 1.5rem;
      background: white;
      color: #4361ee;
      border: none;
      border-radius: 10px;
      padding: 0.65rem 2rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>Álgebra</h1>
    <div class="stats">
      <div class="stat">Puntos<span id="hdr-points">0</span></div>
      <div class="stat">Racha<span id="hdr-streak">0</span></div>
    </div>
  </header>

  <main>
    <div class="level-row">
      <div class="level-badge" id="level-badge" role="button" aria-haspopup="true" aria-expanded="false" tabindex="0">Nivel <span id="level-num">1</span></div>
      <div id="level-menu" role="menu">
        <button class="level-option" data-level="1" role="menuitem"><span class="level-dot"></span>Nivel 1 — ecuaciones simples</button>
        <button class="level-option" data-level="2" role="menuitem"><span class="level-dot"></span>Nivel 2 — dos pasos y fracciones</button>
        <button class="level-option" data-level="3" role="menuitem"><span class="level-dot"></span>Nivel 3 — paréntesis y dos lados</button>
        <button class="level-option" data-level="4" role="menuitem"><span class="level-dot"></span>Nivel 4 — complejidad combinada</button>
      </div>
    </div>
    <div id="problem"></div>
    <div class="input-row">
      <input id="answer" type="text" inputmode="decimal" placeholder="x = ?" autocomplete="off" aria-label="Tu respuesta" />
      <button id="submit">Comprobar</button>
    </div>
    <div id="feedback"></div>
    <button id="next">Siguiente &rarr;</button>
  </main>

  <div id="levelup">
    <div class="emoji">&#127881;</div>
    <div>Nivel <span id="lu-level"></span></div>
    <p>Seguiste practicando y lo lograste!</p>
    <button id="lu-close">Continuar</button>
  </div>

  <script>
  // ════════════════════════════════════════════════
  // STATE
  // ════════════════════════════════════════════════
  const STORAGE_KEY = 'math_app_v1';

  function defaultState() {
    return { points: 0, level: 1, correctCount: 0, streak: 0, lastDate: null };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? Object.assign(defaultState(), JSON.parse(raw)) : defaultState();
    } catch { return defaultState(); }
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function todayStr() {
    return new Date().toISOString().slice(0, 10); // YYYY-MM-DD (UTC)
  }

  // Called once at load: reconciles streak based on last played date, then saves.
  function updateStreak() {
    if (!state.lastDate) return; // first time ever — streak stays 0
    const today = todayStr();
    if (state.lastDate === today) return; // already played today, nothing to do
    const diffDays = Math.round((new Date(today) - new Date(state.lastDate)) / 86400000);
    if (diffDays === 1) state.streak += 1;
    else if (diffDays > 1) state.streak = 0;
    state.lastDate = today;
    saveState();
  }

  // Called on each interaction: records that the player played today.
  // Streak logic is handled entirely by updateStreak() at load time.
  function markPlayedToday() {
    const today = todayStr();
    if (state.lastDate !== today) {
      if (!state.lastDate) state.streak = 1; // first time ever playing
      state.lastDate = today;
      saveState();
    }
  }

  const state = loadState();
  updateStreak();

  // ════════════════════════════════════════════════
  // PROBLEM GENERATOR
  // ════════════════════════════════════════════════

  // Returns a random integer in [min, max] excluding 0 if excludeZero=true
  function rnd(min, max, excludeZero = false) {
    let n;
    do { n = Math.floor(Math.random() * (max - min + 1)) + min; }
    while (excludeZero && n === 0);
    return n;
  }

  // Returns a random non-zero integer in [-max, -1] ∪ [1, max]
  function rndNZ(max) { return rnd(1, max) * (Math.random() < 0.5 ? 1 : -1); }

  // Format coefficient: 1x -> "x", -1x -> "-x", 2x -> "2x"
  function coef(c) {
    if (c === 1) return 'x';
    if (c === -1) return '-x';
    return `${c}x`;
  }

  // Format sign for constant in expression: e.g. + 3 or - 3 (skips zero)
  function sign(n) { return n > 0 ? `+ ${n}` : `- ${Math.abs(n)}`; }

  // HTML fraction: frac(a, b) → renders a over b with a horizontal bar
  function frac(num, den) {
    return `<span class="frac"><span class="num">${num}</span><span class="den">${den}</span></span>`;
  }

  // Wrap explanation steps in a styled list
  function steps(...lines) {
    return `<div class="steps">${lines.map(l => `<div class="step">${l}</div>`).join('')}</div>`;
  }

  // Returns the division steps for "coefExpr / divisor = numerator / divisor → x = result".
  // Skips the fraction line when divisor is 1 (trivial). Keeps it for -1 and all other values.
  function divSteps(coefExpr, divisor, numerator) {
    const result = numerator / divisor;
    if (divisor === 1) return [`x = ${result}`];
    return [
      `dividimos ambos lados entre ${divisor}`,
      `${frac(coefExpr, divisor)} = ${frac(numerator, divisor)}`,
      `x = ${result}`
    ];
  }

  // ── Level 1: one-step  ───────────────────────────
  // x + b = c  or  ax = c
  function genLevel1() {
    if (Math.random() < 0.5) {
      const b = rnd(-10, 10, true);
      const x = rnd(-10, 10, true);
      const c = x + b;
      const expr = b >= 0 ? `x + ${b}` : `x - ${Math.abs(b)}`;
      const op = b >= 0 ? `restamos ${b}` : `sumamos ${Math.abs(b)}`;
      const neg = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
      return {
        display: `${expr} = ${c}`,
        answer: x,
        explanation: steps(
          `${op} a ambos lados`,
          `x + ${b} ${neg} = ${c} ${neg}`,
          `x = ${x}`
        )
      };
    } else {
      const a = rndNZ(10);
      const x = rnd(-10, 10, true);
      const c = a * x;
      return {
        display: `${coef(a)} = ${c}`,
        answer: x,
        explanation: steps(...divSteps(coef(a), a, c))
      };
    }
  }

  // ── Level 2a: two-step  ──────────────────────────
  // ax + b = c
  function genLevel2() {
    const a = rndNZ(8);
    const b = rnd(-10, 10, true);
    const x = rnd(-8, 8, true);
    const c = a * x + b;
    const lhs = b >= 0 ? `${coef(a)} + ${b}` : `${coef(a)} - ${Math.abs(b)}`;
    const step1 = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
    const neg = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
    return {
      display: `${lhs} = ${c}`,
      answer: x,
      explanation: steps(
        step1,
        `${coef(a)} + ${b} ${neg} = ${c} ${neg}`,
        `${coef(a)} = ${c - b}`,
        ...divSteps(coef(a), a, c - b)
      )
    };
  }

  // ── Level 2b: negatives & fractions  ─────────────
  // ax + b = c  or  x/d + b = c
  function genLevel3() {
    if (Math.random() < 0.5) {
      const a = rndNZ(10);
      const b = rnd(-15, 15, true);
      const x = rnd(-10, 10, true);
      const c = a * x + b;
      const lhs = b >= 0 ? `${coef(a)} + ${b}` : `${coef(a)} - ${Math.abs(b)}`;
      const step1 = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
      const neg = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
      return {
        display: `${lhs} = ${c}`,
        answer: x,
        explanation: steps(
          step1,
          `${coef(a)} + ${b} ${neg} = ${c} ${neg}`,
          `${coef(a)} = ${c - b}`,
          ...divSteps(coef(a), a, c - b)
        )
      };
    } else {
      const d = rnd(2, 6);
      const b = rnd(-10, 10, true);
      const x = rnd(-5, 5, true) * d;
      const c = x / d + b;
      const lhs = b >= 0 ? `x/${d} + ${b}` : `x/${d} - ${Math.abs(b)}`;
      const step1 = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
      const neg = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
      return {
        display: `${lhs} = ${c}`,
        answer: x,
        explanation: steps(
          step1,
          `${frac('x', d)} + ${b} ${neg} = ${c} ${neg}`,
          `${frac('x', d)} = ${c - b}`,
          `multiplicamos ambos lados por ${d}`,
          `${frac('x', d)} × ${d} = ${c - b} × ${d}`,
          `x = ${x}`
        )
      };
    }
  }

  // ── Level 3a: parentheses  ───────────────────────
  // a(x + b) = c  or  a(bx + c) = d
  function genLevel4() {
    if (Math.random() < 0.5) {
      const a = rnd(2, 6);
      const b = rnd(-8, 8, true);
      const x = rnd(-8, 8, true);
      const c = a * (x + b);
      const xPlusB = `x ${sign(b)}`;
      const negB = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
      const stepB = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
      return {
        display: `${a}(${xPlusB}) = ${c}`,
        answer: x,
        explanation: steps(
          `dividimos ambos lados entre ${a}`,
          `${frac(`${a}(${xPlusB})`, a)} = ${frac(c, a)}`,
          `${xPlusB} = ${c / a}`,
          stepB,
          `x ${sign(b)} ${negB} = ${c / a} ${negB}`,
          `x = ${x}`
        )
      };
    } else {
      const a = rnd(2, 5);
      const b = rndNZ(4);
      const c = rnd(-6, 6, true);
      const x = rnd(-5, 5, true);
      const d = a * (b * x + c);
      const inner = `${coef(b)} ${sign(c)}`;
      const negC = c >= 0 ? `− ${c}` : `+ ${Math.abs(c)}`;
      const stepC = c >= 0 ? `restamos ${c} a ambos lados` : `sumamos ${Math.abs(c)} a ambos lados`;
      return {
        display: `${a}(${inner}) = ${d}`,
        answer: x,
        explanation: steps(
          `dividimos ambos lados entre ${a}`,
          `${frac(`${a}(${inner})`, a)} = ${frac(d, a)}`,
          `${inner} = ${d / a}`,
          stepC,
          `${coef(b)} ${sign(c)} ${negC} = ${d / a} ${negC}`,
          `${coef(b)} = ${d / a - c}`,
          ...divSteps(coef(b), b, d / a - c)
        )
      };
    }
  }

  // ── Level 3b: variables on both sides  ───────────
  // ax + b = cx + d
  function genLevel5() {
    const a = rndNZ(8);
    let c;
    do { c = rndNZ(8); } while (c === a);
    const x = rnd(-8, 8, true);
    const b = rnd(-10, 10, true);
    const d = (a - c) * x + b;
    if (d === 0) return genLevel5();
    const lhs = b >= 0 ? `${coef(a)} + ${b}` : `${coef(a)} - ${Math.abs(b)}`;
    const rhs = `${coef(c)} ${sign(d)}`;
    // Step: move x terms — show intermediate line with cancellation
    const moveX = c > 0 ? `restamos ${coef(c)} a ambos lados` : `sumamos ${coef(Math.abs(c))} a ambos lados`;
    const cNeg = c > 0 ? `− ${coef(c)}` : `+ ${coef(Math.abs(c))}`;
    const ac = a - c;
    const db = d - b;
    // Step: move constant — show intermediate line
    const moveB = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
    const bNeg = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
    return {
      display: `${lhs} = ${rhs}`,
      answer: x,
      explanation: steps(
        moveX,
        `${coef(a)} ${cNeg} + ${b} = ${coef(c)} ${cNeg} ${sign(d)}`,
        `${coef(ac)} ${sign(b)} = ${d}`,
        moveB,
        `${coef(ac)} ${sign(b)} ${bNeg} = ${d} ${bNeg}`,
        `${coef(ac)} = ${db}`,
        ...divSteps(coef(ac), ac, db)
      )
    };
  }

  // ── Level 4: combined complexity  ────────────────
  // a(bx + c) + dx = e  or  a(x + b) = c(x + d)
  function genLevel6() {
    if (Math.random() < 0.5) {
      const a = rnd(2, 4);
      const b = rndNZ(3);
      const c = rnd(-5, 5, true);
      const d = rndNZ(4);
      const x = rnd(-5, 5, true);
      const e = a * (b * x + c) + d * x;
      const dStr = d > 0 ? `+ ${d}x` : `- ${Math.abs(d)}x`;
      const ab = a * b, ac = a * c, total = ab + d, rhs = e - ac;
      const negAc = ac >= 0 ? `− ${ac}` : `+ ${Math.abs(ac)}`;
      const moveConst = ac >= 0 ? `restamos ${ac} a ambos lados` : `sumamos ${Math.abs(ac)} a ambos lados`;
      return {
        display: `${a}(${coef(b)} ${sign(c)}) ${dStr} = ${e}`,
        answer: x,
        explanation: steps(
          `expandimos: ${a}(${coef(b)} ${sign(c)})`,
          `${coef(ab)} ${sign(ac)} ${dStr} = ${e}`,
          `combinamos términos con x: ${coef(ab)} ${dStr} = ${coef(total)}`,
          `${coef(total)} ${sign(ac)} = ${e}`,
          moveConst,
          `${coef(total)} ${sign(ac)} ${negAc} = ${e} ${negAc}`,
          `${coef(total)} = ${rhs}`,
          ...divSteps(coef(total), total, rhs)
        )
      };
    } else {
      const a = rnd(2, 6);
      let c;
      do { c = rnd(2, 6); } while (c === a);
      const b = rnd(-5, 5, true);
      const x = rnd(-6, 6, true);
      const numerator = (a - c) * x + a * b;
      if (numerator % c !== 0) return genLevel6();
      const d = numerator / c;
      const ac = a - c, cd = c * d, ab = a * b, rhs2 = cd - ab;
      const cNeg = c > 0 ? `− ${coef(c)}` : `+ ${coef(Math.abs(c))}`;
      const moveX = c > 0 ? `restamos ${coef(c)} a ambos lados` : `sumamos ${coef(Math.abs(c))} a ambos lados`;
      const abNeg = ab >= 0 ? `− ${ab}` : `+ ${Math.abs(ab)}`;
      const moveConst2 = ab >= 0 ? `restamos ${ab} a ambos lados` : `sumamos ${Math.abs(ab)} a ambos lados`;
      return {
        display: `${a}(x ${sign(b)}) = ${c}(x ${sign(d)})`,
        answer: x,
        explanation: steps(
          `expandimos: ${a}(x ${sign(b)})`,
          `${a}x ${sign(ab)} = ${c}(x ${sign(d)})`,
          `expandimos: ${c}(x ${sign(d)})`,
          `${a}x ${sign(ab)} = ${c}x ${sign(cd)}`,
          moveX,
          `${a}x ${cNeg} ${sign(ab)} = ${c}x ${cNeg} ${sign(cd)}`,
          `${coef(ac)} ${sign(ab)} = ${cd}`,
          moveConst2,
          `${coef(ac)} ${sign(ab)} ${abNeg} = ${cd} ${abNeg}`,
          `${coef(ac)} = ${rhs2}`,
          ...divSteps(coef(ac), ac, rhs2)
        )
      };
    }
  }

  // ── Dispatcher (4 levels) ────────────────────────
  // Level 1: one-step equations
  // Level 2: two-step equations + fractions
  // Level 3: parentheses + variables on both sides
  // Level 4: combined complexity
  function generateProblem(level) {
    if (level <= 1) return genLevel1();
    if (level <= 2) return Math.random() < 0.5 ? genLevel2() : genLevel3();
    if (level <= 3) return Math.random() < 0.5 ? genLevel4() : genLevel5();
    return genLevel6();
  }

  // ════════════════════════════════════════════════
  // ANSWER CHECKER
  // ════════════════════════════════════════════════

  // Parse user input: accepts integers, decimals, simple fractions (e.g. "3/2")
  function parseAnswer(raw) {
    const s = raw.trim().replace(',', '.'); // allow comma as decimal separator
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    if (/^-?\d+(\.\d+)?$/.test(s)) return parseFloat(s);
    const frac = s.match(/^(-?\d+)\s*\/\s*([1-9]\d*)$/);
    if (frac) return parseInt(frac[1], 10) / parseInt(frac[2], 10);
    return NaN;
  }

  function checkAnswer(userRaw, correctAnswer) {
    const user = parseAnswer(userRaw);
    if (isNaN(user)) return false;
    return Math.abs(user - correctAnswer) < 0.001;
  }

  // ════════════════════════════════════════════════
  // SCORING
  // ════════════════════════════════════════════════

  const CORRECT_FOR_LEVELUP = 10;

  function pointsForLevel(level) {
    return level <= 1 ? 5 : level <= 2 ? 10 : level <= 3 ? 15 : 20;
  }

  // Returns true if a level-up occurred
  function registerCorrect() {
    state.points += pointsForLevel(state.level);
    state.correctCount += 1;
    markPlayedToday();
    saveState();
    if (state.correctCount % CORRECT_FOR_LEVELUP === 0) {
      state.level += 1;
      saveState();
      return true; // level-up!
    }
    return false;
  }

  function registerWrong() {
    markPlayedToday();
    saveState();
  }

  // ════════════════════════════════════════════════
  // UI CONTROLLER
  // ════════════════════════════════════════════════

  let currentProblem = null;

  // DOM refs
  const elProblem   = document.getElementById('problem');
  const elAnswer    = document.getElementById('answer');
  const elSubmit    = document.getElementById('submit');
  const elFeedback  = document.getElementById('feedback');
  const elNext      = document.getElementById('next');
  const elLevelup   = document.getElementById('levelup');
  const elLuLevel   = document.getElementById('lu-level');
  const elLuClose   = document.getElementById('lu-close');
  const elHdrPoints = document.getElementById('hdr-points');
  const elHdrStreak = document.getElementById('hdr-streak');
  const elLevelNum    = document.getElementById('level-num');
  const elLevelBadge  = document.getElementById('level-badge');
  const elLevelMenu   = document.getElementById('level-menu');
  const elLevelOptions = elLevelMenu.querySelectorAll('.level-option');

  function refreshHeader() {
    elHdrPoints.textContent = state.points;
    elHdrStreak.textContent = state.streak;
    elLevelNum.textContent  = state.level;
  }

  function showProblem() {
    currentProblem = generateProblem(state.level);
    elProblem.textContent = currentProblem.display;
    elAnswer.value = '';
    elAnswer.disabled = false;
    elFeedback.className = '';
    elFeedback.innerHTML = '';
    elNext.style.display = 'none';
    elSubmit.style.display = '';
    refreshHeader();
    elAnswer.focus();
  }

  function onSubmit() {
    const raw = elAnswer.value;
    if (!raw.trim()) return;

    elAnswer.disabled = true;
    elSubmit.style.display = 'none';

    const correct = checkAnswer(raw, currentProblem.answer);

    if (correct) {
      const leveled = registerCorrect();
      refreshHeader();
      elFeedback.className = 'correct';
      elFeedback.innerHTML = `<strong>¡Correcto!</strong>${currentProblem.explanation || ''}`;
      elNext.style.display = 'block';
      if (leveled) {
        setTimeout(() => {
          elLuLevel.textContent = state.level;
          elLevelup.classList.add('show');
        }, 600);
      }
    } else {
      registerWrong();
      elFeedback.className = 'wrong';
      elFeedback.innerHTML = `<strong>Incorrecto.</strong> La respuesta correcta es <strong>x = ${currentProblem.answer}</strong>${currentProblem.explanation || ''}`;
      elNext.style.display = 'block';
    }
  }

  function updateLevelMenu() {
    elLevelOptions.forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.level, 10) === state.level);
    });
  }

  function openLevelMenu() {
    updateLevelMenu();
    elLevelMenu.classList.add('open');
    elLevelBadge.setAttribute('aria-expanded', 'true');
  }

  function closeLevelMenu() {
    elLevelMenu.classList.remove('open');
    elLevelBadge.setAttribute('aria-expanded', 'false');
  }

  // Event listeners
  elSubmit.addEventListener('click', onSubmit);
  elAnswer.addEventListener('keydown', e => { if (e.key === 'Enter') onSubmit(); });
  elNext.addEventListener('click', showProblem);

  elLevelBadge.addEventListener('click', () => {
    elLevelMenu.classList.contains('open') ? closeLevelMenu() : openLevelMenu();
  });
  elLevelBadge.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLevelMenu(); }
    if (e.key === 'Escape') closeLevelMenu();
  });
  elLevelOptions.forEach(btn => {
    btn.addEventListener('click', () => {
      state.level = parseInt(btn.dataset.level, 10);
      saveState();
      closeLevelMenu();
      showProblem();
    });
  });
  document.addEventListener('click', e => {
    if (!elLevelBadge.contains(e.target) && !elLevelMenu.contains(e.target)) closeLevelMenu();
  });

  elLuClose.addEventListener('click', () => {
    elLevelup.classList.remove('show');
    showProblem();
  });

  // Boot (showProblem calls refreshHeader internally)
  showProblem();
  </script>
</body>
</html>
