<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matemáticas</title>
  <style>
    /* ── Reset & base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4ff;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }

    /* ── Header ───────────────────────────────────── */
    header {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #4361ee;
      color: white;
      border-radius: 16px;
      padding: 0.75rem 1.25rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 12px rgba(67,97,238,0.3);
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    .stats { display: flex; gap: 1rem; }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 0.75rem;
      opacity: 0.85;
    }
    .stat span { font-size: 1.1rem; font-weight: 700; opacity: 1; }

    /* ── Main card ────────────────────────────────── */
    main {
      width: 100%;
      max-width: 600px;
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .level-badge {
      display: inline-block;
      background: #e0e7ff;
      color: #4361ee;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: 2px solid #c7d2fe;
      margin-bottom: 1rem;
    }
    #problem {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      margin: 1.5rem 0;
      letter-spacing: 0.02em;
      min-height: 3rem;
    }
    @media (min-width: 480px) {
      #problem { font-size: 2rem; }
    }

    /* ── Custom keypad ─────────────────────────────── */
    #answer { display: none; } /* hidden — keypad writes into it */

    .input-row {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    /* Live answer display */
    #answer-display {
      min-height: 3rem;
      background: #f8faff;
      border: 2px solid #d1d5db;
      border-radius: 10px;
      padding: 0.5rem 1rem;
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s;
      cursor: default;
    }
    #answer-display.has-value { border-color: #4361ee; }
    #answer-display .placeholder { color: #9ca3af; font-weight: 400; font-size: 1rem; }
    #answer-display .frac { font-size: 1em; }

    /* Keypad grid */
    #keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.4rem;
    }
    .key {
      background: #f0f4ff;
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      padding: 0.75rem 0;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.12s, transform 0.08s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .key:active { background: #c7d2fe; transform: scale(0.94); }
    .key.key-fraction {
      background: #4361ee;
      color: white;
      font-size: 1.4rem;
    }
    .key.key-fraction:active { background: #3451d1; }
    .key.key-minus { font-size: 1.5rem; }
    .key.key-back { background: #fee2e2; color: #991b1b; font-size: 1.1rem; }
    .key.key-back:active { background: #fca5a5; }
    .key.key-zero { grid-column: span 2; }

    #submit {
      background: #4361ee;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.65rem 1.25rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }
    #submit:hover:not(:disabled) { background: #3451d1; }
    #submit:disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; }
    #submit:focus-visible,
    #next:focus-visible,
    #levelup button:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 2px;
    }

    /* ── Feedback ─────────────────────────────────── */
    #feedback {
      border-radius: 12px;
      padding: 1rem;
      font-size: 0.95rem;
      line-height: 1.5;
      display: none;
    }
    #feedback.correct {
      display: block;
      min-height: 5rem;
      background: #d1fae5;
      color: #065f46;
      border: 1.5px solid #6ee7b7;
    }
    #feedback.wrong {
      display: block;
      min-height: 5rem;
      background: #fee2e2;
      color: #991b1b;
      border: 1.5px solid #fca5a5;
    }
    #feedback strong { display: block; font-size: 1.05rem; margin-bottom: 0.4rem; }
    .steps { margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.35rem; }
    .step { display: flex; align-items: center; gap: 0.4rem; padding-left: 1.2rem; }
    .step-text { padding-left: 0; }
    .step-text::before { content: '→'; opacity: 0.5; flex-shrink: 0; }
    .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; font-size: 0.9em; margin: 0 0.1em; }
    .frac .num { border-bottom: 1.5px solid currentColor; padding: 0 0.15em; line-height: 1.3; }
    .frac .den { padding: 0 0.15em; line-height: 1.3; }

    /* ── Level picker ──────────────────────────────── */
    .level-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      position: relative;
    }
    .level-badge {
      margin-bottom: 0;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .level-badge:hover { background: #c7d2fe; }
    .level-badge::after {
      content: ' ▾';
      font-size: 1.3em;
      opacity: 1;
    }
    #level-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: white;
      border: 1.5px solid #c7d2fe;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(67,97,238,0.15);
      padding: 0.5rem;
      gap: 0.4rem;
      z-index: 50;
      flex-direction: column;
      min-width: 160px;
    }
    #level-menu.open { display: flex; }
    .level-option {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 0.75rem;
      border-radius: 10px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      color: #374151;
      text-align: left;
      transition: background 0.15s;
      width: 100%;
    }
    .level-option:hover { background: #e0e7ff; color: #4361ee; }
    .level-option.active { background: #4361ee; color: white; }
    .level-option .level-dot {
      width: 1.5rem; height: 1.5rem;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.2;
      flex-shrink: 0;
    }
    .level-option.active .level-dot { opacity: 0.35; background: white; }

    /* ── Next button ──────────────────────────────── */
    #next {
      display: none;
      width: 100%;
      margin-top: 1rem;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #next:hover { background: #059669; }

    /* ── Level-up overlay ─────────────────────────── */
    #levelup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(67,97,238,0.92);
      color: white;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      z-index: 100;
      gap: 0.5rem;
    }
    #levelup.show { display: flex; }
    #levelup .emoji { font-size: 4rem; }
    #levelup p { font-size: 1.1rem; font-weight: 400; margin-top: 0.5rem; opacity: 0.85; }
    #levelup button {
      margin-top: 1.5rem;
      background: white;
      color: #4361ee;
      border: none;
      border-radius: 10px;
      padding: 0.65rem 2rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>Álgebra</h1>
    <div class="stats">
      <div class="stat">Puntos<span id="hdr-points">0</span></div>
    </div>
  </header>

  <main>
    <div class="level-row">
      <div class="level-badge" id="level-badge" role="button" aria-haspopup="true" aria-expanded="false" tabindex="0">Nivel <span id="level-num">1</span></div>
      <div id="level-menu" role="menu">
        <button class="level-option" data-level="1" role="menuitem"><span class="level-dot"></span>Nivel 1 — un solo paso</button>
        <button class="level-option" data-level="2" role="menuitem"><span class="level-dot"></span>Nivel 2 — dos pasos</button>
        <button class="level-option" data-level="3" role="menuitem"><span class="level-dot"></span>Nivel 3 — paréntesis y variables</button>
        <button class="level-option" data-level="4" role="menuitem"><span class="level-dot"></span>Nivel 4 — paréntesis y x en ambos lados</button>
        <button class="level-option" data-level="5" role="menuitem"><span class="level-dot"></span>Nivel 5 — ecuaciones con fracciones</button>
        <button class="level-option" data-level="6" role="menuitem"><span class="level-dot"></span>Nivel 6 — fracciones y paréntesis combinados</button>
      </div>
    </div>
    <div id="problem"></div>
    <div class="input-row">
      <input id="answer" type="text" autocomplete="off" aria-label="Tu respuesta" />
      <div id="answer-display" aria-live="polite"><span class="placeholder">x = ?</span></div>
      <div id="keypad" role="group" aria-label="Teclado numérico">
        <button class="key" data-val="7">7</button>
        <button class="key" data-val="8">8</button>
        <button class="key" data-val="9">9</button>
        <button class="key key-back" data-action="back">⌫</button>
        <button class="key" data-val="4">4</button>
        <button class="key" data-val="5">5</button>
        <button class="key" data-val="6">6</button>
        <button class="key key-minus" data-val="-">−</button>
        <button class="key" data-val="1">1</button>
        <button class="key" data-val="2">2</button>
        <button class="key" data-val="3">3</button>
        <button class="key key-fraction" data-val="/">⁄</button>
        <button class="key key-zero" data-val="0">0</button>
        <button class="key" data-action="clear">C</button>
      </div>
      <button id="submit">Comprobar</button>
    </div>
    <div id="feedback"></div>
    <button id="next">Siguiente &rarr;</button>
  </main>

  <div id="levelup">
    <div class="emoji">&#127881;</div>
    <div>Nivel <span id="lu-level"></span></div>
    <p>Seguiste practicando y lo lograste!</p>
    <button id="lu-close">Continuar</button>
  </div>

  <script>
  // ════════════════════════════════════════════════
  // STATE
  // ════════════════════════════════════════════════
  const STORAGE_KEY = 'math_app_v1';

  function defaultState() {
    return { points: 0, level: 1, correctCount: 0, lastDate: null };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? Object.assign(defaultState(), JSON.parse(raw)) : defaultState();
    } catch { return defaultState(); }
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function todayStr() {
    return new Date().toISOString().slice(0, 10); // YYYY-MM-DD (UTC)
  }

  function markPlayedToday() {
    const today = todayStr();
    if (state.lastDate !== today) {
      state.lastDate = today;
      saveState();
    }
  }

  const state = loadState();

  // ════════════════════════════════════════════════
  // PROBLEM GENERATOR
  // ════════════════════════════════════════════════

  // Returns a random integer in [min, max] excluding 0 if excludeZero=true
  function rnd(min, max, excludeZero = false) {
    let n;
    do { n = Math.floor(Math.random() * (max - min + 1)) + min; }
    while (excludeZero && n === 0);
    return n;
  }

  // Returns a random non-zero integer in [-max, -1] ∪ [1, max]
  function rndNZ(max) { return rnd(1, max) * (Math.random() < 0.5 ? 1 : -1); }

  // Format coefficient: 1x -> "x", -1x -> "-x", 2x -> "2x"
  function coef(c) {
    if (c === 1) return 'x';
    if (c === -1) return '-x';
    return `${c}x`;
  }

  // Format sign for constant in expression: e.g. + 3 or - 3 (skips zero)
  function sign(n) { return n > 0 ? `+ ${n}` : `- ${Math.abs(n)}`; }

  // HTML fraction: frac(a, b) → renders a over b with a horizontal bar
  function frac(num, den) {
    return `<span class="frac"><span class="num">${num}</span><span class="den">${den}</span></span>`;
  }

  // Randomly swap LHS and RHS of the display string (50% chance).
  // Explanations always resolve toward x = N so they stay valid either way.
  function maybeFlip(problem) {
    if (Math.random() < 0.5) return problem;
    const eq = problem.display.indexOf(' = ');
    if (eq === -1) return problem;
    problem.display = problem.display.slice(eq + 3) + ' = ' + problem.display.slice(0, eq);
    return problem;
  }

  // Wrap explanation steps in a styled list
  function steps(...lines) {
    return `<div class="steps">${lines.map(l => {
      const plain = l.replace(/<[^>]+>/g, '');
      const isText = /[a-záéíóúüñ]{2,}/i.test(plain);
      return `<div class="step${isText ? ' step-text' : ''}">${l}</div>`;
    }).join('')}</div>`;
  }

  // Greatest common divisor and least common multiple
  function gcd(p, q) { return q === 0 ? Math.abs(p) : gcd(q, p % q); }
  function lcm(p, q) { return Math.abs(p * q) / gcd(p, q); }

  // Render a rational number p/q as integer string or HTML fraction (reduced).
  // Returns { display, val } where val is the float value.
  function rational(p, q) {
    const g = gcd(Math.abs(p), Math.abs(q));
    const sn = (q < 0 ? -p : p) / g;
    const sd = Math.abs(q) / g;
    if (sd === 1) return { display: `${sn}`, val: sn };
    return { display: frac(`${sn}`, `${sd}`), val: sn / sd };
  }

  // Pick a numerator for the final division step ax=N.
  // 80%: N is divisible by a (integer answer).
  // 20%: N is NOT divisible by a but gcd(N,a) keeps denominator ≤ 4 (clean fraction).
  // All equation constants remain integers — no decimals anywhere.
  function pickNumerator(a, intMin, intMax) {
    if (Math.random() < 0.8) {
      // integer answer: pick x in range, derive N = a*x
      const x = rnd(intMin, intMax, true);
      return a * x;
    }
    // fractional answer: pick N that is NOT divisible by a but gives clean fraction
    const absA = Math.abs(a);
    const lo = absA * intMin, hi = absA * intMax;
    for (let attempt = 0; attempt < 40; attempt++) {
      const N = rnd(lo, hi, true);
      if (N % absA === 0) continue;              // skip integer results
      const den = absA / gcd(absA, Math.abs(N)); // denominator of N/absA reduced
      if (den >= 2 && den <= 4) return N;        // clean fraction with small denominator
    }
    // fallback: integer answer
    return absA * rnd(intMin, intMax, true);
  }

  // Returns the division steps for "coefExpr / divisor = numerator / divisor → x = result".
  // Skips the fraction line when divisor is 1 (trivial). Shows reduced fraction as final answer.
  function divSteps(coefExpr, divisor, numerator) {
    if (divisor === 1) return [`x = ${rational(numerator, 1).display}`];
    const r = rational(numerator, divisor);
    return [
      `dividimos ambos lados entre ${divisor}`,
      `${frac(coefExpr, divisor)} = ${frac(numerator, divisor)}`,
      `x = ${r.display}`
    ];
  }

  // ── Level 1: one-step  ───────────────────────────
  // x + b = c  or  ax = c
  function genLevel1() {
    if (Math.random() < 0.5) {
      const b = rnd(-9, 9, true);
      const x = rnd(-9, 9, true);
      const c = x + b;
      const expr = b >= 0 ? `x + ${b}` : `x - ${Math.abs(b)}`;
      const op = b >= 0 ? `restamos ${b}` : `sumamos ${Math.abs(b)}`;
      const neg = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
      // flip: show as c = x+b half the time
      if (Math.random() < 0.5) {
        return {
          display: `${c} = ${expr}`,
          answer: x,
          explanation: steps(`${op} a ambos lados`, `${c} ${neg} = x + ${b} ${neg}`, `x = ${x}`)
        };
      }
      return {
        display: `${expr} = ${c}`,
        answer: x,
        explanation: steps(`${op} a ambos lados`, `x + ${b} ${neg} = ${c} ${neg}`, `x = ${x}`)
      };
    } else {
      const a = rndNZ(6);
      const x = rnd(-9, 9, true);
      const c = a * x;
      // flip: show as c = ax half the time
      if (Math.random() < 0.5) {
        return {
          display: `${c} = ${coef(a)}`,
          answer: x,
          explanation: steps(...divSteps(coef(a), a, c))
        };
      }
      return {
        display: `${coef(a)} = ${c}`,
        answer: x,
        explanation: steps(...divSteps(coef(a), a, c))
      };
    }
  }

  // ── Level 2a: two-step  ──────────────────────────
  // ax + b = c
  function genLevel2() {
    const a = rndNZ(5);
    const b = rnd(-8, 8, true);
    const N = pickNumerator(a, -6, 6); // N = a*x, possibly non-integer answer
    const c = N + b;
    const lhs = b >= 0 ? `${coef(a)} + ${b}` : `${coef(a)} - ${Math.abs(b)}`;
    const step1 = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
    const neg = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
    // flip: show as c = ax+b half the time
    if (Math.random() < 0.5) {
      return {
        display: `${c} = ${lhs}`,
        answer: rational(N, a).val,
        explanation: steps(
          step1,
          `${c} ${neg} = ${coef(a)} + ${b} ${neg}`,
          `${N} = ${coef(a)}`,
          ...divSteps(coef(a), a, N)
        )
      };
    }
    return {
      display: `${lhs} = ${c}`,
      answer: rational(N, a).val,
      explanation: steps(
        step1,
        `${coef(a)} + ${b} ${neg} = ${c} ${neg}`,
        `${coef(a)} = ${N}`,
        ...divSteps(coef(a), a, N)
      )
    };
  }

  // ── Level 2b: negatives & fractions  ─────────────
  // ax + b = c  or  x/d + b = c
  function genLevel3() {
    if (Math.random() < 0.5) {
      const a = rndNZ(6);
      const b = rnd(-8, 8, true);
      const N = pickNumerator(a, -6, 6);
      const c = N + b;
      const lhs = b >= 0 ? `${coef(a)} + ${b}` : `${coef(a)} - ${Math.abs(b)}`;
      const step1 = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
      const neg = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
      // flip: show as c = ax+b half the time
      if (Math.random() < 0.5) {
        return {
          display: `${c} = ${lhs}`,
          answer: rational(N, a).val,
          explanation: steps(
            step1,
            `${c} ${neg} = ${coef(a)} + ${b} ${neg}`,
            `${N} = ${coef(a)}`,
            ...divSteps(coef(a), a, N)
          )
        };
      }
      return {
        display: `${lhs} = ${c}`,
        answer: rational(N, a).val,
        explanation: steps(
          step1,
          `${coef(a)} + ${b} ${neg} = ${c} ${neg}`,
          `${coef(a)} = ${N}`,
          ...divSteps(coef(a), a, N)
        )
      };
    } else {
      const d = rnd(2, 5);
      const b = rnd(-8, 8, true);
      const x = rnd(-4, 4, true) * d;
      const c = x / d + b;
      const lhs = b >= 0 ? `${frac('x', d)} + ${b}` : `${frac('x', d)} - ${Math.abs(b)}`;
      const step1 = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
      const neg = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
      // flip half the time
      if (Math.random() < 0.5) {
        return {
          display: `${c} = ${lhs}`,
          answer: x,
          explanation: steps(
            step1,
            `${c} ${neg} = ${frac('x', d)} + ${b} ${neg}`,
            `${c - b} = ${frac('x', d)}`,
            `multiplicamos ambos lados por ${d}`,
            `${c - b} · ${d} = ${frac('x', d)} · ${d}`,
            `x = ${x}`
          )
        };
      }
      return {
        display: `${lhs} = ${c}`,
        answer: x,
        explanation: steps(
          step1,
          `${frac('x', d)} + ${b} ${neg} = ${c} ${neg}`,
          `${frac('x', d)} = ${c - b}`,
          `multiplicamos ambos lados por ${d}`,
          `${frac('x', d)} · ${d} = ${c - b} · ${d}`,
          `x = ${x}`
        )
      };
    }
  }

  // ── Level 3a: parentheses  ───────────────────────
  // Branch 0: a(x+b) = c          — parenthesis left
  // Branch 1: a(bx+c) = d         — parenthesis left, x coefficient
  // Branch 2: c = a(x+b) or d = a(bx+c)  — parenthesis right
  // Branch 3: a(x+b) = c(x+d)     — parenthesis both sides
  function genLevel4() {
    const branch = Math.floor(Math.random() * 4);

    if (branch === 0) {
      // a(x+b) = c  →  x+b = c/a  →  x = c/a - b
      const a = rnd(2, 5);
      const b = rnd(-6, 6, true);
      const N = pickNumerator(a, -6, 6); // N = a*x, so c = N + a*b
      const c = N + a * b;
      const xPlusB = `x ${sign(b)}`;
      const negB = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
      const stepB = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
      const afterDiv = rational(c, a);   // = x + b
      const ans = rational(N, a);        // = x
      return {
        display: `${a}(${xPlusB}) = ${c}`,
        answer: ans.val,
        explanation: steps(
          `dividimos ambos lados entre ${a}`,
          `${frac(`${a}(${xPlusB})`, a)} = ${frac(c, a)}`,
          `${xPlusB} = ${afterDiv.display}`,
          stepB,
          `x ${sign(b)} ${negB} = ${afterDiv.display} ${negB}`,
          `x = ${ans.display}`
        )
      };
    }

    if (branch === 1) {
      // a(bx+c) = d  →  bx+c = d/a  →  bx = d/a - c  →  x = (d/a-c)/b
      const a = rnd(2, 4);
      const b = rndNZ(3);
      const c = rnd(-5, 5, true);
      const x = rnd(-5, 5, true);
      const d = a * (b * x + c);
      const inner = `${coef(b)} ${sign(c)}`;
      const negC = c >= 0 ? `− ${c}` : `+ ${Math.abs(c)}`;
      const stepC = c >= 0 ? `restamos ${c} a ambos lados` : `sumamos ${Math.abs(c)} a ambos lados`;
      return {
        display: `${a}(${inner}) = ${d}`,
        answer: x,
        explanation: steps(
          `dividimos ambos lados entre ${a}`,
          `${frac(`${a}(${inner})`, a)} = ${frac(d, a)}`,
          `${inner} = ${d / a}`,
          stepC,
          `${coef(b)} ${sign(c)} ${negC} = ${d / a} ${negC}`,
          `${coef(b)} = ${d / a - c}`,
          ...divSteps(coef(b), b, d / a - c)
        )
      };
    }

    if (branch === 2) {
      // c = a(bx+e)  — parenthesis on the right, same math flipped
      const a = rnd(2, 4);
      const b = rndNZ(3);
      const e = rnd(-5, 5, true);
      const x = rnd(-5, 5, true);
      const c = a * (b * x + e);
      const inner = `${coef(b)} ${sign(e)}`;
      const negE = e >= 0 ? `− ${e}` : `+ ${Math.abs(e)}`;
      const stepE = e >= 0 ? `restamos ${e} a ambos lados` : `sumamos ${Math.abs(e)} a ambos lados`;
      return {
        display: `${c} = ${a}(${inner})`,
        answer: x,
        explanation: steps(
          `dividimos ambos lados entre ${a}`,
          `${frac(c, a)} = ${frac(`${a}(${inner})`, a)}`,
          `${c / a} = ${inner}`,
          stepE,
          `${c / a} ${negE} = ${coef(b)} ${sign(e)} ${negE}`,
          `${c / a - e} = ${coef(b)}`,
          ...divSteps(coef(b), b, c / a - e)
        )
      };
    }

    // branch === 3: a(x+b) = c(x+d) — parenthesis on both sides
    const a = rnd(2, 5);
    let c;
    do { c = rnd(2, 5); } while (c === a);
    const b = rnd(-5, 5, true);
    const x = rnd(-5, 5, true);
    // derive d: a*(x+b) = c*(x+d)  →  d = (a*(x+b) - c*x) / c
    const lhs = a * (x + b);
    if (lhs % c !== 0) return genLevel4();
    const xd = lhs / c;        // x + d
    const d = xd - x;
    const ab = a * b;
    const cd = c * d;
    const coefDiff = a - c;
    if (coefDiff === 0) return genLevel4();
    const constR = cd - ab;
    if (constR % coefDiff !== 0) return genLevel4();
    const cNeg = c > 0 ? `− ${coef(c)}` : `+ ${coef(Math.abs(c))}`;
    const moveX = c > 0 ? `restamos ${coef(c)} a ambos lados` : `sumamos ${coef(Math.abs(c))} a ambos lados`;
    const abNeg = ab >= 0 ? `− ${ab}` : `+ ${Math.abs(ab)}`;
    const moveB = ab >= 0 ? `restamos ${ab} a ambos lados` : `sumamos ${Math.abs(ab)} a ambos lados`;
    return {
      display: `${a}(x ${sign(b)}) = ${c}(x ${sign(d)})`,
      answer: x,
      explanation: steps(
        `expandimos: ${a}(x ${sign(b)})`,
        `${coef(a)} ${sign(ab)} = ${c}(x ${sign(d)})`,
        `expandimos: ${c}(x ${sign(d)})`,
        `${coef(a)} ${sign(ab)} = ${coef(c)} ${sign(cd)}`,
        moveX,
        `${coef(a)} ${cNeg} ${sign(ab)} = ${coef(c)} ${cNeg} ${sign(cd)}`,
        `${coef(coefDiff)} ${sign(ab)} = ${cd}`,
        moveB,
        `${coef(coefDiff)} ${sign(ab)} ${abNeg} = ${cd} ${abNeg}`,
        `${coef(coefDiff)} = ${constR}`,
        ...divSteps(coef(coefDiff), coefDiff, constR)
      )
    };
  }

  // ── Level 3b: variables on both sides  ───────────
  // ax + b = cx + d
  function genLevel5() {
    const a = rndNZ(6);
    let c;
    do { c = rndNZ(6); } while (c === a);
    const ac = a - c;
    const N = pickNumerator(ac, -6, 6); // N = ac*x, all equation constants stay integer
    const b = rnd(-8, 8, true);
    const d = N + b;
    if (d === 0) return genLevel5();
    const lhs = b >= 0 ? `${coef(a)} + ${b}` : `${coef(a)} - ${Math.abs(b)}`;
    const rhs = `${coef(c)} ${sign(d)}`;
    const moveX = c > 0 ? `restamos ${coef(c)} a ambos lados` : `sumamos ${coef(Math.abs(c))} a ambos lados`;
    const cNeg = c > 0 ? `− ${coef(c)}` : `+ ${coef(Math.abs(c))}`;
    const moveB = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
    const bNeg = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
    return {
      display: `${lhs} = ${rhs}`,
      answer: rational(N, ac).val,
      explanation: steps(
        moveX,
        `${coef(a)} ${cNeg} + ${b} = ${coef(c)} ${cNeg} ${sign(d)}`,
        `${coef(ac)} ${sign(b)} = ${d}`,
        moveB,
        `${coef(ac)} ${sign(b)} ${bNeg} = ${d} ${bNeg}`,
        `${coef(ac)} = ${N}`,
        ...divSteps(coef(ac), ac, N)
      )
    };
  }

  // ── Level 4: combined complexity  ────────────────
  // a(bx + c) + dx = e  or  a(x + b) = c(x + d)
  function genLevel6() {
    if (Math.random() < 0.5) {
      const a = rnd(2, 4);
      const b = rndNZ(3);
      const c = rnd(-5, 5, true);
      const d = rndNZ(3);
      const total = a * b + d;
      if (total === 0) return genLevel6();
      const N = pickNumerator(total, -5, 5); // N = total*x; e = N + ac stays integer
      const ac = a * c;
      const e = N + ac;
      const ab = a * b;
      const dStr = d > 0 ? `+ ${d}x` : `- ${Math.abs(d)}x`;
      const negAc = ac >= 0 ? `− ${ac}` : `+ ${Math.abs(ac)}`;
      const moveConst = ac >= 0 ? `restamos ${ac} a ambos lados` : `sumamos ${Math.abs(ac)} a ambos lados`;
      return {
        display: `${a}(${coef(b)} ${sign(c)}) ${dStr} = ${e}`,
        answer: rational(N, total).val,
        explanation: steps(
          `expandimos: ${a}(${coef(b)} ${sign(c)})`,
          `${coef(ab)} ${sign(ac)} ${dStr} = ${e}`,
          `combinamos términos con x: ${coef(ab)} ${dStr} = ${coef(total)}`,
          `${coef(total)} ${sign(ac)} = ${e}`,
          moveConst,
          `${coef(total)} ${sign(ac)} ${negAc} = ${e} ${negAc}`,
          `${coef(total)} = ${N}`,
          ...divSteps(coef(total), total, N)
        )
      };
    } else {
      const a = rnd(2, 5);
      let c;
      do { c = rnd(2, 5); } while (c === a);
      const b = rnd(-5, 5, true);
      const x = rnd(-5, 5, true);
      const numerator = (a - c) * x + a * b;
      if (numerator % c !== 0) return genLevel6();
      const d = numerator / c;
      const ac = a - c, cd = c * d, ab = a * b, rhs2 = cd - ab;
      const cNeg = c > 0 ? `− ${coef(c)}` : `+ ${coef(Math.abs(c))}`;
      const moveX = c > 0 ? `restamos ${coef(c)} a ambos lados` : `sumamos ${coef(Math.abs(c))} a ambos lados`;
      const abNeg = ab >= 0 ? `− ${ab}` : `+ ${Math.abs(ab)}`;
      const moveConst2 = ab >= 0 ? `restamos ${ab} a ambos lados` : `sumamos ${Math.abs(ab)} a ambos lados`;
      return {
        display: `${a}(x ${sign(b)}) = ${c}(x ${sign(d)})`,
        answer: x,
        explanation: steps(
          `expandimos: ${a}(x ${sign(b)})`,
          `${a}x ${sign(ab)} = ${c}(x ${sign(d)})`,
          `expandimos: ${c}(x ${sign(d)})`,
          `${a}x ${sign(ab)} = ${c}x ${sign(cd)}`,
          moveX,
          `${a}x ${cNeg} ${sign(ab)} = ${c}x ${cNeg} ${sign(cd)}`,
          `${coef(ac)} ${sign(ab)} = ${cd}`,
          moveConst2,
          `${coef(ac)} ${sign(ab)} ${abNeg} = ${cd} ${abNeg}`,
          `${coef(ac)} = ${rhs2}`,
          ...divSteps(coef(ac), ac, rhs2)
        )
      };
    }
  }

  // ── Level 5: fracciones  ─────────────────────────
  // Type A: (ax + b) / d = c          — whole left side as fraction
  // Type B: ax/d + b = c              — just the x-term is a fraction
  // Type C: (ax + b) / d = cx + e     — fraction on left, x on both sides
  function genLevel7() {
    const type = Math.floor(Math.random() * 3);

    if (type === 0) {
      // (ax + b) / d = c  →  ax + b = c*d  →  ax = c*d - b  →  x = (c*d - b)/a
      const d = rnd(2, 5);
      const a = rndNZ(4);
      const x = rnd(-6, 6, true);
      const b = rnd(-7, 7, true);
      const cd = a * x + b;          // c*d
      if (cd % d !== 0) return genLevel7();
      const c = cd / d;
      const rhs = cd - b;            // a*x
      const negB = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
      const moveB = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
      // flip: show as c = (ax+b)/d half the time
      if (Math.random() < 0.5) {
        return {
          display: `${c} = ${frac(`${coef(a)} ${sign(b)}`, d)}`,
          answer: x,
          explanation: steps(
            `multiplicamos ambos lados por ${d}`,
            `${c} · ${d} = ${frac(`${coef(a)} ${sign(b)}`, d)} · ${d}`,
            `${cd} = ${coef(a)} ${sign(b)}`,
            moveB,
            `${cd} ${negB} = ${coef(a)} ${sign(b)} ${negB}`,
            `${rhs} = ${coef(a)}`,
            ...divSteps(coef(a), a, rhs)
          )
        };
      }
      return {
        display: `${frac(`${coef(a)} ${sign(b)}`, d)} = ${c}`,
        answer: x,
        explanation: steps(
          `multiplicamos ambos lados por ${d}`,
          `${frac(`${coef(a)} ${sign(b)}`, d)} · ${d} = ${c} · ${d}`,
          `${frac(`(${coef(a)} ${sign(b)}) · ${d}`, d)} = ${c} · ${d}`,
          `${coef(a)} ${sign(b)} = ${cd}`,
          moveB,
          `${coef(a)} ${sign(b)} ${negB} = ${cd} ${negB}`,
          `${coef(a)} = ${rhs}`,
          ...divSteps(coef(a), a, rhs)
        )
      };
    }

    if (type === 1) {
      // ax/d + b = c  →  ax/d = c - b  →  ax = (c-b)*d  →  x = (c-b)*d / a
      const d = rnd(2, 5);
      const a = rndNZ(4);
      const x = rnd(-6, 6, true);
      if ((a * x) % d !== 0) return genLevel7(); // ensure ax/d is integer for display clarity
      const b = rnd(-7, 7, true);
      const c = (a * x) / d + b;
      const cb = c - b;             // ax/d value
      const rhs = cb * d;           // ax
      const negB = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
      const moveB = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
      const axFrac = a === 1 ? frac('x', d) : a === -1 ? frac('-x', d) : frac(`${a}x`, d);
      // flip: show as c = ax/d + b half the time
      if (Math.random() < 0.5) {
        return {
          display: `${c} = ${axFrac} ${sign(b)}`,
          answer: x,
          explanation: steps(
            moveB,
            `${c} ${negB} = ${axFrac} ${sign(b)} ${negB}`,
            `${cb} = ${axFrac}`,
            `multiplicamos ambos lados por ${d}`,
            `${cb} · ${d} = ${axFrac} · ${d}`,
            `${rhs} = ${coef(a)}`,
            ...divSteps(coef(a), a, rhs)
          )
        };
      }
      return {
        display: `${axFrac} ${sign(b)} = ${c}`,
        answer: x,
        explanation: steps(
          moveB,
          `${axFrac} ${sign(b)} ${negB} = ${c} ${negB}`,
          `${axFrac} = ${cb}`,
          `multiplicamos ambos lados por ${d}`,
          `${axFrac} · ${d} = ${cb} · ${d}`,
          `${frac(`${coef(a)} · ${d}`, d)} = ${cb} · ${d}`,
          `${coef(a)} = ${rhs}`,
          ...divSteps(coef(a), a, rhs)
        )
      };
    }

    // type === 2
    // (ax + b) / d = cx + e  →  ax + b = (cx + e)*d  →  ax + b = cdx + ed
    // →  (a - cd)x = ed - b
    const d = rnd(2, 4);
    const a = rndNZ(4);
    let cCoef;
    do { cCoef = rndNZ(3); } while (cCoef === a);
    const x = rnd(-5, 5, true);
    const b = rnd(-6, 6, true);
    const e = rnd(-6, 6, true);
    const lhsNum = a * x + b;        // numerator of left fraction
    if (lhsNum % d !== 0) return genLevel7();
    const rhsVal = lhsNum / d;       // must equal cx + e
    if (rhsVal !== cCoef * x + e) return genLevel7();
    const cd = cCoef * d;
    const ed = e * d;
    const coefDiff = a - cd;         // coefficient of x after multiply
    if (coefDiff === 0) return genLevel7();
    const constDiff = ed - b;        // rhs constant after rearranging
    if (constDiff % coefDiff !== 0) return genLevel7();
    const negB = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
    const moveB = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
    const cNeg = cd > 0 ? `− ${coef(cd)}` : `+ ${coef(Math.abs(cd))}`;
    const moveX = cd > 0 ? `restamos ${coef(cd)} a ambos lados` : `sumamos ${coef(Math.abs(cd))} a ambos lados`;
    return {
      display: `${frac(`${coef(a)} ${sign(b)}`, d)} = ${coef(cCoef)} ${sign(e)}`,
      answer: x,
      explanation: steps(
        `multiplicamos ambos lados por ${d}`,
        `${frac(`${coef(a)} ${sign(b)}`, d)} · ${d} = (${coef(cCoef)} ${sign(e)}) · ${d}`,
        `${frac(`(${coef(a)} ${sign(b)}) · ${d}`, d)} = (${coef(cCoef)} ${sign(e)}) · ${d}`,
        `${coef(a)} ${sign(b)} = ${coef(cd)} ${sign(ed)}`,
        moveB,
        `${coef(a)} ${sign(b)} ${negB} = ${coef(cd)} ${sign(ed)} ${negB}`,
        `${coef(a)} = ${coef(cd)} ${sign(ed - b)}`,
        moveX,
        `${coef(a)} ${cNeg} = ${coef(cd)} ${cNeg} ${sign(ed - b)}`,
        `${coef(coefDiff)} = ${constDiff}`,
        ...divSteps(coef(coefDiff), coefDiff, constDiff)
      )
    };
  }

  // ── Level 6: desafío total  ──────────────────────
  // Type A: (ax+b)/d = (cx+e)/f        — fractions both sides
  // Type B: a(bx+c)/d = ex + f         — parenthesis inside fraction vs plain
  // Type C: (ax+b)/d = e(cx+f)         — fraction vs parenthesis
  // Type D: (ax+b)/d + cx = ex + f     — fraction + x-term vs plain
  function genLevel8() {
    const type = Math.floor(Math.random() * 4);

    if (type === 0) {
      // (ax+b)/d = (cx+e)/f
      // multiply both sides by lcm(d,f): f*(ax+b) = d*(cx+e)
      // fax + fb = dcx + de  →  (fa-dc)x = de - fb
      const d = rnd(2, 5);
      let f;
      do { f = rnd(2, 5); } while (f === d);
      const a = rndNZ(4);
      let c;
      do { c = rndNZ(4); } while (c === a);
      const x = rnd(-5, 5, true);
      const b = rnd(-6, 6, true);
      // derive e so that (ax+b)/d = (cx+e)/f holds exactly
      // e = f*(ax+b)/d - cx; need (ax+b) divisible by d
      const lhsNum = a * x + b;
      if (lhsNum % d !== 0) return genLevel8();
      const lhsVal = lhsNum / d;       // = (cx+e)/f
      // need cx+e = lhsVal*f, so e = lhsVal*f - cx
      const e = lhsVal * f - c * x;
      const fa = f * a, dc = d * c, fb = f * b, de = d * e;
      const coefX = fa - dc;
      if (coefX === 0) return genLevel8();
      const constR = de - fb;
      if (constR % coefX !== 0) return genLevel8();
      const lcmDF = lcm(d, f);
      const multL = lcmDF / d, multR = lcmDF / f;
      const fbNeg = fb >= 0 ? `− ${fb}` : `+ ${Math.abs(fb)}`;
      const moveB = fb >= 0 ? `restamos ${fb} a ambos lados` : `sumamos ${Math.abs(fb)} a ambos lados`;
      const dcNeg = dc > 0 ? `− ${coef(dc)}` : `+ ${coef(Math.abs(dc))}`;
      const moveX = dc > 0 ? `restamos ${coef(dc)} a ambos lados` : `sumamos ${coef(Math.abs(dc))} a ambos lados`;
      return {
        display: `${frac(`${coef(a)} ${sign(b)}`, d)} = ${frac(`${coef(c)} ${sign(e)}`, f)}`,
        answer: x,
        explanation: steps(
          `mínimo común múltiplo de ${d} y ${f}: ${lcmDF}`,
          `multiplicamos ambos lados por ${lcmDF}`,
          `${frac(`${coef(a)} ${sign(b)}`, d)} · ${lcmDF} = ${frac(`${coef(c)} ${sign(e)}`, f)} · ${lcmDF}`,
          `${frac(`(${coef(a)} ${sign(b)}) · ${lcmDF}`, d)} = ${frac(`(${coef(c)} ${sign(e)}) · ${lcmDF}`, f)}`,
          `${multL}·(${coef(a)} ${sign(b)}) = ${multR}·(${coef(c)} ${sign(e)})`,
          `expandimos: ${multL}·(${coef(a)} ${sign(b)})`,
          `${coef(fa)} ${sign(fb)} = ${multR}·(${coef(c)} ${sign(e)})`,
          `expandimos: ${multR}·(${coef(c)} ${sign(e)})`,
          `${coef(fa)} ${sign(fb)} = ${coef(dc)} ${sign(de)}`,
          moveB,
          `${coef(fa)} ${sign(fb)} ${fbNeg} = ${coef(dc)} ${sign(de)} ${fbNeg}`,
          `${coef(fa)} = ${coef(dc)} ${sign(de - fb)}`,
          moveX,
          `${coef(fa)} ${dcNeg} = ${coef(dc)} ${dcNeg} ${sign(de - fb)}`,
          `${coef(coefX)} = ${constR}`,
          ...divSteps(coef(coefX), coefX, constR)
        )
      };
    }

    if (type === 1) {
      // a(bx+c) / d = ex + f
      // a*(bx+c) = d*(ex+f)  →  abx + ac = dex + df  →  (ab-de)x = df - ac
      const d = rnd(2, 4);
      const a = rnd(2, 4);
      const b = rndNZ(3);
      const c = rnd(-5, 5, true);
      let e;
      do { e = rndNZ(4); } while (e * d === a * b); // avoid coefX === 0
      const x = rnd(-5, 5, true);
      // derive f: a*(bx+c)/d = ex+f  →  f = a*(bx+c)/d - ex
      const inner = a * (b * x + c);
      if (inner % d !== 0) return genLevel8();
      const lhsVal = inner / d;
      const f = lhsVal - e * x;
      const ab = a * b, ac = a * c, de = d * e, df = d * f;
      const coefX = ab - de;
      if (coefX === 0) return genLevel8();
      const constR = df - ac;
      if (constR % coefX !== 0) return genLevel8();
      const acNeg = ac >= 0 ? `− ${ac}` : `+ ${Math.abs(ac)}`;
      const moveC = ac >= 0 ? `restamos ${ac} a ambos lados` : `sumamos ${Math.abs(ac)} a ambos lados`;
      const deNeg = de > 0 ? `− ${coef(de)}` : `+ ${coef(Math.abs(de))}`;
      const moveX = de > 0 ? `restamos ${coef(de)} a ambos lados` : `sumamos ${coef(Math.abs(de))} a ambos lados`;
      const inner2 = `${coef(b)} ${sign(c)}`;
      return {
        display: `${frac(`${a}(${inner2})`, d)} = ${coef(e)} ${sign(f)}`,
        answer: x,
        explanation: steps(
          `multiplicamos ambos lados por ${d}`,
          `${frac(`${a}(${inner2})`, d)} · ${d} = (${coef(e)} ${sign(f)}) · ${d}`,
          `${frac(`${a}(${inner2}) · ${d}`, d)} = (${coef(e)} ${sign(f)}) · ${d}`,
          `${a}(${inner2}) = ${coef(de)} ${sign(df)}`,
          `expandimos: ${a}(${inner2})`,
          `${coef(ab)} ${sign(ac)} = ${coef(de)} ${sign(df)}`,
          moveC,
          `${coef(ab)} ${sign(ac)} ${acNeg} = ${coef(de)} ${sign(df)} ${acNeg}`,
          `${coef(ab)} = ${coef(de)} ${sign(df - ac)}`,
          moveX,
          `${coef(ab)} ${deNeg} = ${coef(de)} ${deNeg} ${sign(df - ac)}`,
          `${coef(coefX)} = ${constR}`,
          ...divSteps(coef(coefX), coefX, constR)
        )
      };
    }

    if (type === 2) {
      // (ax+b)/d = e(cx+f)
      // ax+b = d*e*(cx+f)  →  ax+b = decx + def  →  (a-dec)x = def - b
      const d = rnd(2, 4);
      const e = rnd(2, 3);
      const de = d * e;
      const a = rndNZ(4);
      let c;
      do { c = rndNZ(3); } while (a === de * c); // avoid coefX === 0
      const x = rnd(-5, 5, true);
      const b = rnd(-6, 6, true);
      // derive f: (ax+b)/d = e*(cx+f)  →  f = (ax+b)/(d*e) - cx
      const lhsNum = a * x + b;
      if (lhsNum % de !== 0) return genLevel8();
      const lhsVal = lhsNum / de;   // = cx + f
      const f = lhsVal - c * x;
      const dec = de * c, def_ = de * f;
      const coefX = a - dec;
      if (coefX === 0) return genLevel8();
      const constR = def_ - b;
      if (constR % coefX !== 0) return genLevel8();
      const bNeg = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
      const moveB = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
      const decNeg = dec > 0 ? `− ${coef(dec)}` : `+ ${coef(Math.abs(dec))}`;
      const moveX = dec > 0 ? `restamos ${coef(dec)} a ambos lados` : `sumamos ${coef(Math.abs(dec))} a ambos lados`;
      const inner2 = `${coef(c)} ${sign(f)}`;
      return {
        display: `${frac(`${coef(a)} ${sign(b)}`, d)} = ${e}(${inner2})`,
        answer: x,
        explanation: steps(
          `multiplicamos ambos lados por ${d}`,
          `${frac(`${coef(a)} ${sign(b)}`, d)} · ${d} = ${e}(${inner2}) · ${d}`,
          `${frac(`(${coef(a)} ${sign(b)}) · ${d}`, d)} = ${e}(${inner2}) · ${d}`,
          `${coef(a)} ${sign(b)} = ${de}(${inner2})`,
          `expandimos: ${de}(${inner2})`,
          `${coef(a)} ${sign(b)} = ${coef(dec)} ${sign(def_)}`,
          moveB,
          `${coef(a)} ${sign(b)} ${bNeg} = ${coef(dec)} ${sign(def_)} ${bNeg}`,
          `${coef(a)} = ${coef(dec)} ${sign(def_ - b)}`,
          moveX,
          `${coef(a)} ${decNeg} = ${coef(dec)} ${decNeg} ${sign(def_ - b)}`,
          `${coef(coefX)} = ${constR}`,
          ...divSteps(coef(coefX), coefX, constR)
        )
      };
    }

    // type === 3
    // (ax+b)/d + cx = ex + f
    // multiply by d: ax+b + cdx = dex + df  →  (a+cd)x + b = dex + df
    // →  (a+cd-de)x = df - b
    const d = rnd(2, 4);
    const a = rndNZ(4);
    const c = rndNZ(3);
    let e;
    do { e = rndNZ(4); } while (a + c * d === e * d); // avoid coefX === 0
    const x = rnd(-5, 5, true);
    const b = rnd(-6, 6, true);
    // derive f: (ax+b)/d + cx = ex + f  →  f = (ax+b)/d + cx - ex
    const lhsNum = a * x + b;
    if (lhsNum % d !== 0) return genLevel8();
    const lhsVal = lhsNum / d;
    const f = lhsVal + c * x - e * x;
    const cd = c * d, de = e * d, df = f * d;
    const coefX = a + cd - de;
    if (coefX === 0) return genLevel8();
    const constR = df - b;
    if (constR % coefX !== 0) return genLevel8();
    const cxStr = c > 0 ? `+ ${coef(c)}` : `- ${coef(Math.abs(c))}`;
    const axFrac = frac(`${coef(a)} ${sign(b)}`, d);
    const bNeg = b >= 0 ? `− ${b}` : `+ ${Math.abs(b)}`;
    const moveB = b >= 0 ? `restamos ${b} a ambos lados` : `sumamos ${Math.abs(b)} a ambos lados`;
    const deNeg = de > 0 ? `− ${coef(de)}` : `+ ${coef(Math.abs(de))}`;
    const moveX = de > 0 ? `restamos ${coef(de)} a ambos lados` : `sumamos ${coef(Math.abs(de))} a ambos lados`;
    const acd = a + cd;
    return {
      display: `${axFrac} ${cxStr} = ${coef(e)} ${sign(f)}`,
      answer: x,
      explanation: steps(
        `multiplicamos ambos lados por ${d}`,
        `(${axFrac} ${cxStr}) · ${d} = (${coef(e)} ${sign(f)}) · ${d}`,
        `(${frac(`(${coef(a)} ${sign(b)}) · ${d}`, d)} ${cxStr}) = (${coef(e)} ${sign(f)}) · ${d}`,
        `${coef(a)} ${sign(b)} ${sign(cd)}x = ${coef(de)} ${sign(df)}`,
        `combinamos términos con x: ${coef(a)} ${sign(cd)}x = ${coef(acd)}`,
        `${coef(acd)} ${sign(b)} = ${coef(de)} ${sign(df)}`,
        moveB,
        `${coef(acd)} ${sign(b)} ${bNeg} = ${coef(de)} ${sign(df)} ${bNeg}`,
        `${coef(acd)} = ${coef(de)} ${sign(df - b)}`,
        moveX,
        `${coef(acd)} ${deNeg} = ${coef(de)} ${deNeg} ${sign(df - b)}`,
        `${coef(coefX)} = ${constR}`,
        ...divSteps(coef(coefX), coefX, constR)
      )
    };
  }

  // ── Dispatcher (5 levels) ────────────────────────
  // Level 1: one-step equations
  // Level 2: two-step equations + simple fractions
  // Level 3: parentheses + variables on both sides
  // Level 4: combined complexity
  // Level 5: fracciones — fractions in the equation from the start
  function generateProblem(level) {
    if (level <= 1) return genLevel1();
    if (level <= 2) return Math.random() < 0.5 ? genLevel2() : genLevel3();
    if (level <= 3) return Math.random() < 0.5 ? genLevel4() : genLevel5();
    if (level <= 4) return genLevel6();
    if (level <= 5) return genLevel7();
    return genLevel8();
  }

  // ════════════════════════════════════════════════
  // ANSWER CHECKER
  // ════════════════════════════════════════════════

  // Parse user input: accepts integers, decimals, simple fractions.
  // Tolerant of spaces anywhere (e.g. "5 / 4", " -3 ", "5/ 4").
  function parseAnswer(raw) {
    const s = raw.replace(/\s+/g, '').replace(',', '.'); // strip all spaces, normalise comma
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    if (/^-?\d+\.\d+$/.test(s)) return parseFloat(s);
    const m = s.match(/^(-?\d+)\/([1-9]\d*)$/);
    if (m) return parseInt(m[1], 10) / parseInt(m[2], 10);
    return NaN;
  }

  // Render the correct answer as a fraction string for display (never decimals).
  function displayAnswer(val) {
    // Reconstruct p/q from float by checking small denominators
    for (const den of [1, 2, 3, 4, 5, 6, 7, 8]) {
      const num = Math.round(val * den);
      if (Math.abs(num / den - val) < 0.0001 && gcd(Math.abs(num), den) === den / den) {
        return rational(num, den).display;
      }
    }
    return rational(Math.round(val * 100), 100).display; // fallback
  }

  function checkAnswer(userRaw, correctAnswer) {
    const user = parseAnswer(userRaw);
    if (isNaN(user)) return false;
    return Math.abs(user - correctAnswer) < 0.001;
  }

  // ════════════════════════════════════════════════
  // SCORING
  // ════════════════════════════════════════════════

  const CORRECT_FOR_LEVELUP = 10;

  function pointsForLevel(level) {
    return level <= 1 ? 5 : level <= 2 ? 10 : level <= 3 ? 15 : level <= 4 ? 20 : level <= 5 ? 25 : 30;
  }

  // Returns true if a level-up occurred
  function registerCorrect() {
    state.points += pointsForLevel(state.level);
    state.correctCount += 1;
    markPlayedToday();
    saveState();
    if (state.correctCount % CORRECT_FOR_LEVELUP === 0) {
      state.level += 1;
      saveState();
      return true; // level-up!
    }
    return false;
  }

  function registerWrong() {
    markPlayedToday();
    saveState();
  }

  // ════════════════════════════════════════════════
  // UI CONTROLLER
  // ════════════════════════════════════════════════

  let currentProblem = null;

  // DOM refs
  const elProblem   = document.getElementById('problem');
  const elAnswer    = document.getElementById('answer');
  const elSubmit    = document.getElementById('submit');
  const elFeedback  = document.getElementById('feedback');
  const elNext      = document.getElementById('next');
  const elLevelup   = document.getElementById('levelup');
  const elLuLevel   = document.getElementById('lu-level');
  const elLuClose   = document.getElementById('lu-close');
  const elHdrPoints = document.getElementById('hdr-points');
  const elLevelNum    = document.getElementById('level-num');
  const elLevelBadge  = document.getElementById('level-badge');
  const elLevelMenu   = document.getElementById('level-menu');
  const elLevelOptions = elLevelMenu.querySelectorAll('.level-option');
  const elDisplay   = document.getElementById('answer-display');
  const elKeypad    = document.getElementById('keypad');

  // ── Keypad logic ────────────────────────────────────────────────
  function updateDisplay() {
    const val = elAnswer.value;
    if (!val) {
      elDisplay.innerHTML = '<span class="placeholder">x = ?</span>';
      elDisplay.classList.remove('has-value');
      elSubmit.disabled = true;
      return;
    }
    elSubmit.disabled = false;
    elDisplay.classList.add('has-value');
    const slash = val.indexOf('/');
    if (slash !== -1) {
      const num = val.slice(0, slash) || '0';
      const den = val.slice(slash + 1);
      elDisplay.innerHTML = den
        ? `<span class="frac"><span class="num">${num}</span><span class="den">${den}</span></span>`
        : `<span class="frac"><span class="num">${num}</span><span class="den" style="min-width:1.5ch">&nbsp;</span></span>`;
    } else {
      elDisplay.textContent = val;
    }
  }

  function keypadAppend(ch) {
    const cur = elAnswer.value;
    // Only one slash allowed
    if (ch === '/' && cur.includes('/')) return;
    // Minus only at start
    if (ch === '-' && cur.length > 0) return;
    elAnswer.value = cur + ch;
    updateDisplay();
  }

  function keypadBack() {
    elAnswer.value = elAnswer.value.slice(0, -1);
    updateDisplay();
  }

  function keypadClear() {
    elAnswer.value = '';
    updateDisplay();
  }

  function setKeypadDisabled(disabled) {
    elKeypad.querySelectorAll('.key').forEach(btn => { btn.disabled = disabled; });
  }

  elKeypad.addEventListener('click', e => {
    const btn = e.target.closest('.key');
    if (!btn || btn.disabled) return;
    if (btn.dataset.action === 'back')  { keypadBack();  return; }
    if (btn.dataset.action === 'clear') { keypadClear(); return; }
    if (btn.dataset.val !== undefined)  { keypadAppend(btn.dataset.val); }
  });

  // Physical keyboard passthrough (desktop)
  document.addEventListener('keydown', e => {
    if (elAnswer.disabled) return;
    if (e.key >= '0' && e.key <= '9')    { keypadAppend(e.key); return; }
    if (e.key === '-')                    { keypadAppend('-');   return; }
    if (e.key === '/')                    { e.preventDefault(); keypadAppend('/'); return; }
    if (e.key === 'Backspace')            { keypadBack();        return; }
    if (e.key === 'Delete')               { keypadClear();       return; }
    if (e.key === 'Enter')                { onSubmit();          return; }
  });

  function refreshHeader() {
    elHdrPoints.textContent = state.points;
    elLevelNum.textContent  = state.level;
  }

  function showProblem() {
    currentProblem = generateProblem(state.level);
    elProblem.innerHTML = currentProblem.display;
    elAnswer.value = '';
    elAnswer.disabled = false;
    elSubmit.disabled = true;
    updateDisplay();
    setKeypadDisabled(false);
    elFeedback.className = '';
    elFeedback.innerHTML = '';
    elNext.style.display = 'none';
    elSubmit.style.display = '';
    refreshHeader();
  }

  function onSubmit() {
    const raw = elAnswer.value;
    if (!raw.trim()) return;

    elAnswer.disabled = true;
    setKeypadDisabled(true);
    elSubmit.style.display = 'none';

    const correct = checkAnswer(raw, currentProblem.answer);

    if (correct) {
      const leveled = registerCorrect();
      refreshHeader();
      elFeedback.className = 'correct';
      elFeedback.innerHTML = `<strong>¡Correcto!</strong>${currentProblem.explanation || ''}`;
      elNext.style.display = 'block';
      if (leveled) {
        setTimeout(() => {
          elLuLevel.textContent = state.level;
          elLevelup.classList.add('show');
        }, 600);
      }
    } else {
      registerWrong();
      elFeedback.className = 'wrong';
      elFeedback.innerHTML = `<strong>Incorrecto.</strong> La respuesta correcta es <strong>x = ${displayAnswer(currentProblem.answer)}</strong>${currentProblem.explanation || ''}`;
      elNext.style.display = 'block';
    }
  }

  function updateLevelMenu() {
    elLevelOptions.forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.level, 10) === state.level);
    });
  }

  function openLevelMenu() {
    updateLevelMenu();
    elLevelMenu.classList.add('open');
    elLevelBadge.setAttribute('aria-expanded', 'true');
  }

  function closeLevelMenu() {
    elLevelMenu.classList.remove('open');
    elLevelBadge.setAttribute('aria-expanded', 'false');
  }

  // Event listeners
  elSubmit.addEventListener('click', onSubmit);
  elNext.addEventListener('click', showProblem);

  elLevelBadge.addEventListener('click', () => {
    elLevelMenu.classList.contains('open') ? closeLevelMenu() : openLevelMenu();
  });
  elLevelBadge.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLevelMenu(); }
    if (e.key === 'Escape') closeLevelMenu();
  });
  elLevelOptions.forEach(btn => {
    btn.addEventListener('click', () => {
      state.level = parseInt(btn.dataset.level, 10);
      saveState();
      closeLevelMenu();
      showProblem();
    });
  });
  document.addEventListener('click', e => {
    if (!elLevelBadge.contains(e.target) && !elLevelMenu.contains(e.target)) closeLevelMenu();
  });

  elLuClose.addEventListener('click', () => {
    elLevelup.classList.remove('show');
    showProblem();
  });

  // Boot (showProblem calls refreshHeader internally)
  showProblem();
  </script>
</body>
</html>
